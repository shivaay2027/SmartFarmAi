apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartfarm-ai-service
  namespace: smartfarm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: smartfarm/ai-ml-service:latest
        ports:
        - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: 1 # Request 1 GPU for PyTorch Inference
            memory: "8Gi"
            cpu: "2"
        env:
        - name: PINECONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: smartfarm-secrets
              key: pinecone-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: smartfarm
spec:
  selector:
    app: ai-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
